<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Riven Chat</title>
  <link rel="stylesheet" href="/ui/style.css?v=7">
</head>
<body>

<div id="app">
  <!-- Header -->
  <header id="header">
    <div class="logo">
      <span class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </span>
      Riven
    </div>

    <div class="header-actions">
      <label for="shard-select" style="font-size:12px;color:var(--text-muted);">Shard:</label>
      <select id="shard-select" style="
        background: var(--bg-tertiary);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text-primary);
        font-size: 12px;
        padding: 4px 8px;
        outline: none;
      ">
        <option value="">Loading...</option>
      </select>

      <button class="btn" id="clear-session-btn" title="Clear session and messages">
        <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
        Clear
      </button>

      <button class="btn" id="open-editor-btn" title="Open file editor (new window)">
        <svg viewBox="0 0 24 24"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
        Editor
      </button>

      <button class="btn" id="toggle-panel-btn" title="Toggle workflow panel">
        <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
        Plan
      </button>
    </div>
  </header>

  <!-- Main -->
  <div id="main">
    <div id="chat-area">
      <!-- Messages -->
      <div id="messages"></div>

      <!-- Input -->
      <div id="input-area">
        <textarea
          id="message-input"
          placeholder="Ask Riven something..."
          rows="1"
        ></textarea>
        <button id="send-btn" title="Send">
          <svg viewBox="0 0 24 24">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Workflow panel -->
    <div id="workflow-panel" class="hidden">
      <div class="panel-header">
        <div class="panel-title">
          <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
          Workflow Plan
        </div>
        <button class="panel-close-btn" id="panel-close-btn" title="Close panel">×</button>
      </div>
      <div class="panel-body" id="panel-body">
        <div class="panel-empty">No active workflow.<br>Start one with guide_workflow.</div>
      </div>
    </div>
  </div>

  <!-- Status bar -->
  <div id="status-bar">
    <div class="status-item">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">Ready</span>
    </div>
    <div class="status-item">
      Session: <span id="session-display">—</span>
    </div>
  </div>
</div>

<!-- Error banner -->
<div id="error-banner" class="error-banner" style="display:none">
  <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  <span id="error-text"></span>
</div>


<script>
(function() {
  // ── State ──────────────────────────────────────────────
  let sessionId = localStorage.getItem('riven_session') || generateSessionId();
  localStorage.setItem('riven_session', sessionId);
  document.getElementById('session-display').textContent = sessionId;

  let isStreaming = false;
  let currentEventSource = null;
  let pendingThinking = null;   // {element, buffer}
  let thinkingId = 0;           // track thinking blocks to create new elements
  let shards = [];              // loaded from API
  let defaultShard = 'codehammer';

  // ── Helpers ────────────────────────────────────────────
  function generateSessionId() {
    return 'sess-' + Math.random().toString(36).slice(2, 10);
  }

  function scrollToBottom() {
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function cleanToken(token) {
    // Strip timestamps like [2026-04-28 17:13] or [2026-04-28 17:27] and leading newlines
    return token.replace(/\[\d{4}-\d{2}-\d{2} [\d:]+\]/g, '').replace(/^[\n\r]+/, '');
  }

  function cleanContent(content) {
    if (!content) return '';
    let text = String(content);
    // Strip timestamps
    text = cleanToken(text);
    return text;
  }

  function extractToolCalls(content) {
    // Extract [tool_calls]JSON[/tool_calls] from content and parse
    if (!content) return [];
    const match = String(content).match(/\[tool_calls\]\s*([\s\S]*?)\s*\[\/tool_calls\]/);
    if (!match) {
      console.log('extractToolCalls: no match in', content?.slice(0, 100));
      return [];
    }
    try {
      const parsed = JSON.parse(match[1]);
      console.log('extractToolCalls: parsed', parsed);
      return parsed;
    } catch (e) {
      console.error('Failed to parse tool_calls:', e, 'raw:', match[1]);
      return [];
    }
  }

  function setStatus(connected, msg) {
    const dot = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    dot.className = 'dot' + (connected ? (connected === 'error' ? ' error' : ' connected') : '');
    text.textContent = msg || (connected ? 'Connected' : 'Ready');
  }

  function showError(msg) {
    const banner = document.getElementById('error-banner');
    document.getElementById('error-text').textContent = msg;
    banner.style.display = 'flex';
    scrollToBottom();
  }

  function hideError() {
    document.getElementById('error-banner').style.display = 'none';
  }

  function setInputEnabled(enabled) {
    document.getElementById('message-input').disabled = !enabled;
    isStreaming = !enabled;
    updateButtonState();
  }

  function updateButtonState() {
    const btn = document.getElementById('send-btn');
    btn.classList.remove('stopping');
    if (isStreaming) {
      btn.classList.add('stop-btn');
      btn.disabled = false;
      btn.title = 'Stop current inference';
      btn.innerHTML = `
        <svg viewBox="0 0 24 24">
          <rect x="6" y="6" width="12" height="12"/>
        </svg>
      `;
    } else {
      btn.classList.remove('stop-btn');
      btn.disabled = false;
      btn.title = 'Send';
      btn.innerHTML = `
        <svg viewBox="0 0 24 24">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      `;
    }
  }

  // ── Markdown parser ──────────────────────────────────────
  // Lightweight: code blocks, inline code, **bold**, _italic_, headings, links.
  // Escapes HTML first, then applies markdown transforms.
  //
  // Markdown parsing order (must be this specific to handle links in code blocks):
  //
  // 1. Extract links (including those inside code blocks) so placeholders survive
  // 2. Extract fenced code blocks so their raw content (parentheses, etc.) is
  //    not mangled by HTML escaping — but links inside them are preserved as
  //    placeholders and restored after the code block is put back.
  // 3. HTML escape everything that remains.
  // 4. Restore code blocks (their content is HTML-safe now).
  // 5. Apply inline markdown transforms (bold, italic, headings, line breaks).
  // 6. Restore links (step 5 above may touch plain links; code block links are
  //    already placeholders and restored here too).
  //
  // Security: javascript:, data:, and non-http(s)/relative URLs are blocked.
  const _LINK_PLACEHOLDER = '\x00LINK\x00';
  const _CODE_PLACEHOLDER = '\x00CODE\x00';

  function parseMarkdown(text) {
    if (!text) return '';

    // 1. Extract all markdown links, recording each link's original text position.
    //    Link placeholders inside fenced code blocks are preserved as-is.
    const links = [];
    text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_m, label, url) => {
      const safe = _isUrlSafe(url) ? url : '';
      links.push({ label, url: safe, pos: _m.index });
      return `[${label}]${_LINK_PLACEHOLDER}${links.length - 1}`;
    });

    // 2. Extract fenced code blocks ( ```lang\n...\n``` ), recording original-text ranges.
    //    The captured code content still has link placeholders intact.
    const codeBlocks = [];
    text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_m, lang, code) => {
      const idx = codeBlocks.length;
      // Track the original-text start/end of this code block so we can
      // skip link restoration for links that fall inside it.
      codeBlocks.push({ lang, code: code.trim(), origStart: _m.index, origEnd: _m.index + _m[0].length });
      return `${_CODE_PLACEHOLDER}${idx}`;
    });

    // 3. Escape HTML (parentheses in remaining text are now safe)
    const esc = escapeHtml(text);

    // 4. Restore code blocks — HTML-escaped content goes inside <pre><code>.
    //    Link placeholders inside the code are preserved.
    let html = esc.replace(
      new RegExp(`${_CODE_PLACEHOLDER}(\d+)`, 'g'),
      (_m, idx) => {
        const cb = codeBlocks[parseInt(idx, 10)];
        const langLabel = cb.lang
          ? `<span class="cb-lang">${escapeHtml(cb.lang)}</span>`
          : '';
        return `<div class="code-block">${langLabel}<pre><code>${cb.code}</code></pre></div>`;
      }
    );

    // 5. Inline markdown transforms (bold, italic, headings, line breaks)
    html = html
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/_(.+?)_/g, '<em>$1</em>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>');

    // 6. Restore links as <a> tags.
    //    Skip links that fall inside code block original-text ranges so that
    //    URLs inside ``` blocks stay as plain text (not wrapped in <a>).
    html = html.replace(
      new RegExp(`\\[([^\\]]+)\\]${_LINK_PLACEHOLDER}(\\d+)`, 'g'),
      (_m, label, idx) => {
        const link = links[parseInt(idx, 10)];
        if (!link || !link.url) return label;
        // Guard: skip if this link's original position is inside a code block
        if (link.pos != null && codeBlocks.some(cb => link.pos >= cb.origStart && link.pos < cb.origEnd)) {
          return label; // render as plain text inside the code block
        }
        const rel = link.url.startsWith('/') ? '' : ' target="_blank" rel="noopener noreferrer"';
        return `<a href="${link.url}"${rel}>${label}</a>`;
      }
    );

    // 7. Auto-link bare URLs (https://, http://).
    //    Runs after markdown links are restored so we don't double-process.
    //
    //    Matches URLs preceded by start-of-string or safe chars (\s, (, [).
    //    Each match is validated in JS to:
    //    - Skip if preceded by </a>  (already wrapped in a link)
    //    - Skip if preceded by "     (inside href="..." attribute)
    //    - Skip if preceded by >     (HTML tag closer — breaks <code>...)
    //
    //    Trailing punctuation is trimmed:
    //    - ) stripped only if URL has a matching ( inside it
    //    - > stripped only if preceded by < (HTML tag closer)
    //    - other punctuation (.,;:!?) always stripped
    // 7b. Auto-link bare URLs inside <code> blocks (text extracted so HTML
    //     tags are stripped, preventing <code><a>...</a></code> nesting).
    html = _linkifyInCodeBlocks(html);

    // 7. Auto-link bare URLs in the rest of the HTML.
    html = _autoLinkBareUrls(html);

    return html;
  }

  // Extracts <code> block contents, auto-links bare URLs inside them,
  // then puts the blocks back. Uses textContent (strips HTML tags) so the
  // char-before check works on raw code content. Also strips ` backticks
  // so a URL returned as `https://url.com` by the model renders as a link.
  function _linkifyInCodeBlocks(html) {
    const CODE_RE = /<code>([\s\S]*?)<\/code>/g;
    const LINK_RE = /https?:\/\/[^\s<>&"'\]]+/g;

    return html.replace(CODE_RE, (match, codeContent) => {
      // textContent strips existing HTML tags (e.g. <a> from restored markdown
      // links becomes plain text), and decodes HTML entities.
      const text = codeContent.replace(/<[^>]+>/g, '');

      return match.replace(codeContent, (codeContent || '').replace(LINK_RE, (url) => {
        const pos = text.indexOf(url);
        if (pos === -1) return url;
        const before = pos === 0 ? '' : text[pos - 1];
        if (before && !/[\s\[(]/.test(before)) return url;
        if (before === '"') return url;
        // Strip trailing punctuation (same rules as _autoLinkBareUrls)
        let trimmed = url;
        if (trimmed.endsWith(')') && trimmed.includes('(')) {
          trimmed = trimmed.slice(0, -1);
        } else if (trimmed.endsWith('>') && trimmed.includes('<')) {
          trimmed = trimmed.slice(0, -1);
        } else {
          trimmed = trimmed.replace(/[.,;:!?]+$/, '');
        }
        return `<a href="${trimmed}" target="_blank" rel="noopener noreferrer">${trimmed}</a>`;
      }));
    });
  }

  // Auto-links bare https:// URLs in HTML text.
  // Guards:
  //   - URL must be preceded by start-of-string, space, ( or [
  //   - Skip if preceded by "  (inside href attribute)
  //   - Skip if preceded by >  (HTML tag closer — protects <code> content)
  // Trailing punctuation: ) stripped if URL contains (, > stripped if preceded by <,
  //                       other punctuation (.,;:!?) always stripped
  function _autoLinkBareUrls(html) {
    return html.replace(/https?:\/\/[^\s<>"'\]&]+/g, (match) => {
      // Find the LAST occurrence of this URL to avoid matching the same URL
      // earlier in an href attribute (which would be preceded by ").
      const pos = html.lastIndexOf(match);
      if (pos === -1) return match;

      const before = pos === 0 ? '' : html[pos - 1];

      // Must be preceded by start-of-string or safe char (space, (, [)
      if (before && !/[\s\[(]/.test(before)) return match;

      // Skip if preceded by " (href attribute) or > (HTML tag closer)
      if (before === '"' || before === '>') return match;

      // Strip trailing punctuation
      let url = match;
      if (url.endsWith(')') && url.includes('(')) {
        url = url.slice(0, -1);
      } else if (url.endsWith('>') && url.includes('<')) {
        url = url.slice(0, -1);
      } else {
        url = url.replace(/[.,;:!?]+$/, '');
      }

      return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
    });
  }

  function _isUrlSafe(url) {
    if (!url) return false;
    const s = url.trim().toLowerCase();
    // Allow http://, https://, and /-relative URLs only
    if (s.startsWith('http://') || s.startsWith('https://') || s.startsWith('/')) return true;
    // Block javascript:, data:, vbscript: and any other scheme
    if (/^[a-z][a-z0-9+\-]*:/i.test(s)) return false;
    return false;
  }

  // ── Message builders ────────────────────────────────────
  function appendMessage(role, content) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;

    if (role === 'user' || role === 'assistant') {
      const label = role === 'assistant' ? 'Riven' : 'User';
      if (role === 'assistant') {
        // Two-div streaming: raw text accumulator (hidden) + rendered output (visible)
        div.innerHTML = `
          <div class="message-role">${label}</div>
          <div class="message-content"></div>
          <div class="raw-accum" style="display:none" aria-hidden="true"></div>
        `;
        // For history loading: populate accumulator and render markdown
        if (content) {
          const rawEl = div.querySelector('.raw-accum');
          const contentEl = div.querySelector('.message-content');
          if (rawEl) rawEl.textContent = content;
          if (contentEl) contentEl.innerHTML = parseMarkdown(content);
        }
      } else {
        div.innerHTML = `
          <div class="message-role">${label}</div>
          <div class="message-content">${escapeHtml(cleanContent(content))}</div>
        `;
      }
    } else if (role === 'thinking') {
      div.innerHTML = `
        <div class="thinking-header">
          <span class="thinking-label">Thinking</span>
        </div>
        <div class="thinking-content"></div>
      `;
    } else if (role === 'tool-call') {
      div.innerHTML = `
        <div class="tool-call-header">
          <span class="tool-call-name">${escapeHtml(content.name)}</span>
          <span>⚡</span>
        </div>
        ${content.args ? `<div class="tool-call-args">${escapeHtml(JSON.stringify(content.args, null, 2))}</div>` : ''}
      `;
    } else if (role === 'tool-result') {
      const isError = !!content.error;
      div.innerHTML = `
        <div class="tool-result-header">↩ ${escapeHtml(content.name)} ${isError ? '❌' : '✓'}</div>
        <div class="tool-result-body">${parseMarkdown(content.result || content.error || '(empty)')}</div>
      `;
    }

    msgs.appendChild(div);
    scrollToBottom();
    return div;
  }

  function streamToken(token) {
    const cleaned = cleanToken(token);
    if (!cleaned) return;

    const msgs = document.getElementById('messages');
    let last = msgs.lastElementChild;
    if (!last || !last.classList.contains('assistant') || last.dataset.streaming !== 'true') {
      last = appendMessage('assistant', '');
      last.dataset.streaming = 'true';
    }

    // Append raw text to hidden accumulator
    const rawEl = last.querySelector('.raw-accum');
    if (rawEl) rawEl.textContent += cleaned;

    // Schedule a render cycle (throttled to rAF — ~60fps)
    scheduleMarkdownRender(last);
    scrollToBottom();
  }

  // ── Live markdown render loop ─────────────────────────────
  // Reads raw text from .raw-accum, renders markdown to .message-content
  // via requestAnimationFrame so it runs at ~60fps regardless of token rate.
  let _pendingRenders = new Set();
  let _rafScheduled = false;

  function scheduleMarkdownRender(msgEl) {
    _pendingRenders.add(msgEl);
    if (_rafScheduled) return;
    _rafScheduled = true;
    requestAnimationFrame(() => {
      _rafScheduled = false;
      _pendingRenders.forEach(el => {
        const raw = el.querySelector('.raw-accum');
        const out = el.querySelector('.message-content');
        if (raw && out) out.innerHTML = parseMarkdown(raw.textContent || '');
      });
      _pendingRenders.clear();
    });
  }

  // ── SSE streaming ────────────────────────────────────────
  async function sendMessage(text) {
    if (isStreaming || !text.trim()) return;

    hideError();
    setInputEnabled(false);
    setStatus(true, 'Waiting for response...');

    // Show user message
    appendMessage('user', text);
    document.getElementById('message-input').value = '';
    pendingThinking = null;  // Reset thinking state
    thinkingId = 0;

    const shard = document.getElementById('shard-select').value;

    try {
      const response = await fetch('/api/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          stream: true,
          session_id: sessionId,
          shard_name: shard,
        }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({ detail: response.statusText }));
        throw new Error(err.detail || `HTTP ${response.status}`);
      }

      setStatus(true, 'Receiving stream...');

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let pendingToolCall = null;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const raw = line.slice(6).trim();
          if (!raw) continue;

          let event;
          try { event = JSON.parse(raw); } catch { continue; }

          if (event.token !== undefined) {
            pendingThinking = null;  // End thinking block, next one gets new element
            streamToken(event.token);
          }
          else if (event.thinking !== undefined) {
            if (!pendingThinking) {
              thinkingId++;
              pendingThinking = { id: thinkingId, element: appendMessage('thinking', {}), buffer: '' };
            }
            pendingThinking.buffer += cleanToken(event.thinking);
            const contentEl = pendingThinking.element.querySelector('.thinking-content');
            if (contentEl) contentEl.innerHTML = parseMarkdown(pendingThinking.buffer);
          }
          else if (event.tool_call !== undefined) {
            pendingThinking = null;  // End thinking block
            pendingToolCall = event.tool_call;
            appendMessage('tool-call', { name: event.tool_call.name, args: event.tool_call.args });
            // Refresh workflow panel immediately after workflow tool calls
            const wfTools = ['workflow_status', 'mark_step_done', 'mark_step_in_progress',
                             'skip_step', 'expand_implement_steps', 'advance_stage', 'stop_workflow',
                             'guide_workflow', 'build_workflow', 'start_workflow'];
            if (wfTools.includes(event.tool_call.name)) {
              loadWorkflowPanel();
            }
          }
          else if (event.tool_result !== undefined) {
            if (pendingToolCall) {
              pendingToolCall = null;
            }
            const res = event.tool_result;
            appendMessage('tool-result', {
              name: res.name || 'tool',
              result: res.content,  // Backend yields 'content', not 'result'
              error: res.error,
            });
          }
          else if (event.error !== undefined) {
            showError(event.error);
          }
          else if (event.done !== undefined) {
            const msgs = document.getElementById('messages');
            const last = msgs.lastElementChild;
            if (last && last.dataset.streaming === 'true') {
              last.dataset.streaming = 'false';
              // Final render pass: ensure markdown is fully applied
              scheduleMarkdownRender(last);
            }
          }
        }
      }

      setStatus(true, 'Done');
    } catch (e) {
      showError(e.message);
      setStatus(false, 'Error');
    } finally {
      setInputEnabled(true);
      document.getElementById('message-input').focus();
    }
  }

  // ── Form handling ───────────────────────────────────────
  const form = document.getElementById('chat-form');
  const input = document.getElementById('message-input');
  const sendBtn = document.getElementById('send-btn');

  // Auto-grow textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 200) + 'px';
  });

  // Enter to send (Shift+Enter for newline)
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(input.value);
    }
  });

  sendBtn.addEventListener('click', () => {
    if (isStreaming) {
      abortStream();
    } else {
      sendMessage(input.value);
    }
  });

  async function abortStream() {
    // Immediately grey out — user knows stop is in flight
    const btn = document.getElementById('send-btn');
    btn.classList.add('stopping');
    btn.disabled = true;

    try {
      await fetch(`/api/v1/chat/abort?session_id=${encodeURIComponent(sessionId)}`);
      // SSE reader picks up the cancel error event and finalises the UI
    } catch (e) {
      console.warn('Abort request failed:', e);
      // Even if the HTTP call fails, the SSE stream might still close
    }
  }

  const clearSessionBtn = document.getElementById('clear-session-btn');
  clearSessionBtn.addEventListener('click', async () => {
    // Clear messages
    document.getElementById('messages').innerHTML = '';
    hideError();
    
    // Reset session in backend
    try {
      await fetch('/api/v1/chat/reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId }),
      });
    } catch (e) {
      console.warn('Session reset failed:', e);
    }
    
    // Generate new session ID
    sessionId = generateSessionId();
    localStorage.setItem('riven_session', sessionId);
    document.getElementById('session-display').textContent = sessionId;
    setStatus(false, 'Ready');
    document.getElementById('message-input').focus();
  });

  document.getElementById('open-editor-btn').addEventListener('click', () => {
    window.open(`/web/editor/?session=${encodeURIComponent(sessionId)}`, '_blank', 'noopener,noreferrer');
  });

  // ── Load shards ──────────────────────────────────────────
  async function loadShards() {
    try {
      const resp = await fetch('/api/v1/chat/shards');
      if (!resp.ok) return;
      const data = await resp.json();
      shards = data.shards || [];
      defaultShard = data.default || 'codehammer';
      
      const select = document.getElementById('shard-select');
      select.innerHTML = '';
      for (const shard of shards) {
        const opt = document.createElement('option');
        opt.value = shard.name;
        opt.textContent = shard.display_name || shard.name;
        if (shard.name === defaultShard) opt.selected = true;
        select.appendChild(opt);
      }
    } catch (e) {
      console.error('Failed to load shards:', e);
      // Fallback: single default option
      document.getElementById('shard-select').innerHTML = 
        '<option value="codehammer">CodeHammer</option>';
    }
  }

  // ── Load history ─────────────────────────────────────────
  async function loadHistory() {
    try {
      // Add random cache-buster to URL to prevent any caching
      const cacheBuster = `_cb=${Date.now()}${Math.random()}`;
      const resp = await fetch(`/api/v1/history?session_id=${encodeURIComponent(sessionId)}&${cacheBuster}`, {
        cache: 'reload',  // Force fetch from network, ignore cache
        credentials: 'same-origin',
      });
      if (!resp.ok) {
        console.error('History fetch failed:', resp.status);
        return;
      }
      const data = await resp.json();
      const messages = data.messages || [];
      
      for (const msg of messages) {
        const role = msg.role;
        const content = msg.content;
        
        if (role === 'user') {
          appendMessage('user', cleanContent(content));
        } else if (role === 'assistant') {
          // Extract tool calls from [tool_calls]...[/tool_calls] wrapper in content
          const extractedToolCalls = extractToolCalls(content);
          
          // Strip [tool_calls] wrapper and timestamps to get text content
          let textContent = String(content || '').replace(/\[tool_calls\][\s\S]*?\[\/tool_calls\]/g, '');
          textContent = cleanToken(textContent);
          
          // Render tool calls first (before any assistant text)
          if (extractedToolCalls.length > 0) {
            const msgs = document.getElementById('messages');
            for (const tc of extractedToolCalls) {
              msgs.appendChild(createToolCallElement(tc));
            }
          }
          
          // Only create assistant bubble if there's actual text content
          if (textContent.trim()) {
            const div = appendMessage('assistant', textContent);
            div.dataset.streaming = 'false';
          }
        } else if (role === 'tool') {
          // Tool results have content, name/function fields
          const toolName = msg.name || msg.function || 'tool';
          const toolResult = content || '';
          appendMessage('tool-result', {
            name: toolName,
            result: toolResult,
          });
        }
      }
      
      if (messages.length > 0) {
        scrollToBottom();
      }
    } catch (e) {
      console.error('Failed to load history:', e);
    }
  }

  function createToolCallElement(toolCall) {
    const div = document.createElement('div');
    div.className = 'message tool-call';
    // Tool calls from [tool_calls] wrapper have {id, function: {name, arguments}}
    const name = toolCall.function?.name || toolCall.name || 'unknown';
    const args = toolCall.function?.arguments || toolCall.args || {};
    const hasArgs = args && typeof args === 'object' && Object.keys(args).length > 0;
    div.innerHTML = `
      <div class="tool-call-header">
        <span class="tool-call-name">${escapeHtml(name)}</span>
        <span>⚡</span>
      </div>
      ${hasArgs ? `<div class="tool-call-args">${escapeHtml(JSON.stringify(args, null, 2))}</div>` : ''}
    `;
    return div;
  }

  // ── Workflow Panel ────────────────────────────────────────
  let panelPollInterval = null;
  let panelVisible = false;  // starts hidden, shown when workflow goes active
  const PANEL_POLL_MS = 4000;

  function loadWorkflowPanel() {
    const panel = document.getElementById('workflow-panel');
    const toggleBtn = document.getElementById('toggle-panel-btn');

    // Always enable the toggle button — even if API fails we still want
    // users to be able to open the panel and see the empty/error state.
    // The button being disabled shouldn't be a UX trap.
    toggleBtn.disabled = false;

    if (panel.classList.contains('hidden') && !panelVisible) return;

    fetch(`/api/v1/workflow/status?session_id=${encodeURIComponent(sessionId)}`)
      .then(r => r.json())
      .then(data => {
        renderWorkflowPanel(data);
        // Auto-show panel when a workflow becomes active
        if (data.active && !panelVisible) {
          panelVisible = true;
          panel.classList.remove('hidden');
          toggleBtn.classList.add('active');
        }
      })
      .catch(err => {
        console.warn('Workflow panel load failed:', err);
        // Show a friendly error in the panel so the user knows something went wrong
        const body = document.getElementById('panel-body');
        body.innerHTML = '<div class="panel-empty">Workflow panel unavailable.<br>Check server logs.</div>';
      });
  }

  function startPanelPolling() {
    if (panelPollInterval) return;
    panelPollInterval = setInterval(loadWorkflowPanel, PANEL_POLL_MS);
  }

  function stopPanelPolling() {
    if (panelPollInterval) {
      clearInterval(panelPollInterval);
      panelPollInterval = null;
    }
  }

  function renderWorkflowPanel(data) {
    const body = document.getElementById('panel-body');

    if (!data.active) {
      body.innerHTML = '<div class="panel-empty">No active workflow.<br>Start one with guide_workflow.</div>';
      return;
    }

    let html = `<div class="panel-workflow-name">${escapeHtml(data.workflow_name || data.workflow_id || '')}</div>`;

    for (const stage of (data.stages || [])) {
      const isCurrent = stage.status === 'current';
      const dotClass = stage.status;
      const nameClass = stage.status;

      html += `<div class="panel-stage">`;
      html += `<div class="panel-stage-header">`;
      html += `<div class="panel-stage-dot ${dotClass}"></div>`;
      html += `<div class="panel-stage-name ${nameClass}">${escapeHtml(stage.name)}</div>`;
      html += `</div>`;

      if (stage.description) {
        html += `<div class="panel-stage-desc">${escapeHtml(stage.description)}</div>`;
      }
      if (stage.gate_description) {
        html += `<div class="panel-stage-gate">Gate: ${escapeHtml(stage.gate_description)}</div>`;
      }

      if (stage.steps && stage.steps.length > 0) {
        html += `<div class="panel-steps">`;
        for (const step of stage.steps) {
          const iconClass = step.status === 'COMPLETE' ? 'complete' :
                            step.status === 'SKIPPED' ? 'skipped' :
                            step.status === 'IN_PROGRESS' ? 'in-progress' : 'pending';
          const iconChar = step.status === 'COMPLETE' ? '✓' :
                           step.status === 'SKIPPED' ? '⊘' :
                           step.status === 'IN_PROGRESS' ? '→' : '○';
          const descClass = step.status === 'COMPLETE' || step.status === 'SKIPPED' ? 'complete' : 'pending';
          html += `<div class="panel-step ${isCurrent ? 'current-stage' : ''}">`;
          html += `<span class="panel-step-icon ${iconClass}">${iconChar}</span>`;
          html += `<span class="panel-step-desc ${descClass}">${escapeHtml(step.description)}</span>`;
          html += `</div>`;
        }
        html += `</div>`;

        if (isCurrent && data.stage_progress) {
          html += `<div class="panel-progress">${data.stage_progress[0]}/${data.stage_progress[1]} steps</div>`;
        }
      }

      html += `</div>`;
    }

    body.innerHTML = html;
  }

  // Toggle panel visibility
  function togglePanel() {
    const panel = document.getElementById('workflow-panel');
    panelVisible = !panelVisible;
    if (panelVisible) {
      panel.classList.remove('hidden');
      document.getElementById('toggle-panel-btn').classList.add('active');
      loadWorkflowPanel();
      startPanelPolling();
    } else {
      panel.classList.add('hidden');
      document.getElementById('toggle-panel-btn').classList.remove('active');
      stopPanelPolling();
    }
  }

  document.getElementById('toggle-panel-btn').addEventListener('click', togglePanel);
  document.getElementById('panel-close-btn').addEventListener('click', togglePanel);

  // ── Initialize ───────────────────────────────────────────
  setStatus(false, 'Ready');
  loadShards().then(() => loadHistory()).then(() => {
    // Check for active workflow on load and auto-show panel if found
    loadWorkflowPanel();
    // Start polling only if a workflow is already active
    fetch(`/api/v1/workflow/status?session_id=${encodeURIComponent(sessionId)}`)
      .then(r => r.json())
      .then(data => {
        if (data.active) {
          panelVisible = true;
          document.getElementById('workflow-panel').classList.remove('hidden');
          document.getElementById('toggle-panel-btn').classList.add('active');
          startPanelPolling();
        }
      })
      .catch(() => {});
  });
  document.getElementById('message-input').focus();
})();
</script>

  document.getElementById('chat-form').remove();
