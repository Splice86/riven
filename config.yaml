# Riven Configuration
# This file is gitignored - add local overrides to config_local.yaml
#
# Cores are loaded from the cores/ folder
# Each .yaml file in cores/ defines a core

# Default core to use
default_core: code_hammer

# Memory API settings
memory_api:
  db_name: "riven"

# File context settings
file_context:
  token_limit: 48000  # Max tokens before showing warning (default 32K)