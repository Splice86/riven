# Riven Core Configuration
# This file is committed - use for default values
# Override with secrets.yaml or env vars

# API server settings
server:
  host: "0.0.0.0"
  port: 8080

# File operations
file:
  # Require files to be opened via open_file() before edit operations.
  # Set to false to disable the context guard (useful for testing).
  context_required: true

# Memory API settings
memory_api:
  db_name: "riven"
  url: "http://127.0.0.1:8030"  # Template fallback
  # Prepend [YYYY-MM-DD HH:MM] timestamp to context content
  include_timestamp: true

# Context settings
context:
  # Max top-level summaries to include (summaries summarize older messages)
  max_summaries: 3
  # Trigger summarization when unsummarized count reaches this (set on memory API)
  trigger_limit: 40
  # Keep at least this many unsummarized after summary (set on memory API)
  min_keep: 20

# Named LLM configs (URLs here are templates, secrets in secrets.yaml)
# Shards reference these by name: llm_config: primary
llm:
  primary:
    url: "http://127.0.0.1:8000/v1"
    model: "MiniMax-M2.7"
    timeout: 120
  alternate:
    url: "http://127.0.0.1:8000/v1"
    model: "lukealonso/MiniMax-M2.7-NVFP4"
    timeout: 120

# Tool execution
tool_timeout: 60

# Web module
web_timeout: 30
web_max_content_length: 10000

# Max function calls per run
max_function_calls: 20

# System prompt template (shards can override)
system: "You are a helpful assistant."

# Default shard to use
default_shard: codehammer

# Modules available globally
modules:
  - time
  - file
  - shell
  - memory
  - web

# Debug settings
debug_dir: "~/.riven/logs"
debug_snapshots: false
