# Riven Core Configuration
# This file is committed - use for default values
# Override with secrets.yaml or env vars

# API server settings
server:
  host: "0.0.0.0"
  port: 8080

# Context budgeting
# Total context budget (messages + file content combined).
# When exceeded, messages are trimmed oldest-first to fit.
# File content is NEVER trimmed to make room — files have their own hard cap.
context:
  limit: 68000  # ~5K reserved for LLM response buffer on a 72K model

# File content limit (hard cap — files never exceed this).
# If open files collectively exceed this, open_file()/open_function() REJECT.
file:
  limit: 45000

# Named LLM configs (URLs here are templates, secrets in secrets.yaml)
# Shards reference these by name: llm_config: primary
llm:
  primary:
    url: "http://127.0.0.1:8000/v1"
    model: "MiniMax-M2.7"
    timeout: 120
  alternate:
    url: "http://127.0.0.1:8000/v1"
    model: "lukealonso/MiniMax-M2.7-NVFP4"
    timeout: 120

# Tool execution
tool_timeout: 60

# Web module
web_timeout: 30
web_max_content_length: 10000

# Max function calls per run
max_function_calls: 200

# System prompt template (shards can override)
system: "You are a helpful assistant."

# Default shard to use
default_shard: codehammer

# Modules available globally
modules:
  - project
  - time
  - file
  - shell
  - web_tools

# Debug settings
debug_dir: "~/.riven/logs"
debug_snapshots: false
