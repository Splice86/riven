<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riven Screen</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.5;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ---- Header ---- */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    flex-shrink: 0;
    gap: 12px;
  }

  #header .title {
    font-weight: 700;
    color: #58a6ff;
    font-size: 14px;
    letter-spacing: 0.5px;
  }

  #header .meta {
    font-size: 11px;
    color: #8b949e;
  }

  #header .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    background: #21262d;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #484f58;
    flex-shrink: 0;
  }
  .dot.connected  { background: #3fb950; }
  .dot.bound      { background: #58a6ff; }
  .dot.error      { background: #f85149; }
  .dot.idle       { background: #484f58; }

  /* ---- File display ---- */
  #display {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }

  #file-header {
    padding: 4px 12px;
    font-size: 11px;
    color: #8b949e;
    background: #161b22;
    border-bottom: 1px solid #21262d;
    flex-shrink: 0;
  }

  #lines {
    padding: 8px 0;
    counter-reset: line;
  }

  .line {
    display: flex;
    padding: 0 12px;
    min-height: 19.5px;
  }

  .line:hover { background: #161b22; }

  .line-num {
    color: #484f58;
    width: 48px;
    flex-shrink: 0;
    text-align: right;
    padding-right: 16px;
    user-select: none;
    font-size: 12px;
  }

  .line-content {
    flex: 1;
    white-space: pre;
    overflow-x: auto;
    color: #c9d1d9;
  }

  .line-content .token-kw   { color: #ff7b72; }  /* keywords */
  .line-content .token-str  { color: #a5d6ff; }  /* strings */
  .line-content .token-cmt  { color: #8b949e; font-style: italic; }  /* comments */
  .line-content .token-fn   { color: #d2a8ff; }  /* function names */
  .line-content .token-num  { color: #79c0ff; }  /* numbers */
  .line-content .token-op   { color: #ff7b72; }  /* operators */
  .line-content .token-cls  { color: #ffa657; }  /* class names */

  /* Diff highlighting */
  .line.added    { background: rgba(63, 185, 80, 0.15); border-left: 2px solid #3fb950; }
  .line.removed  { background: rgba(248, 81, 73, 0.10); border-left: 2px solid #f85149; text-decoration: line-through; opacity: 0.6; }
  .line.changed  { background: rgba(88, 166, 255, 0.10); border-left: 2px solid #58a6ff; }

  /* ---- Footer ---- */
  #footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 12px;
    background: #161b22;
    border-top: 1px solid #30363d;
    font-size: 10px;
    color: #484f58;
    flex-shrink: 0;
  }

  /* ---- Status overlay ---- */
  #status-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #0d1117;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    z-index: 100;
  }
  #status-overlay.visible { display: flex; }
  #status-overlay .msg { color: #8b949e; font-size: 14px; }
  #status-overlay .sub { color: #484f58; font-size: 12px; }
  #status-overlay .dot { width: 12px; height: 12px; border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  #release-btn {
    background: #21262d;
    color: #8b949e;
    border: 1px solid #30363d;
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  #release-btn:hover { background: #f85149; color: #fff; border-color: #f85149; }

  /* ---- Scroll controls ---- */


  /* Line highlight flash on new/updated content */
  @keyframes line-flash {
    0%   { background: rgba(88, 166, 255, 0.40); }
    100% { background: transparent; }
  }
  .line.flash { animation: line-flash 1.2s ease-out forwards; }

  /* Riven-directed highlight (gold, fades over time) */
  @keyframes riven-highlight {
    0%   { background: rgba(255, 197, 61, 0.45); }
    60%  { background: rgba(255, 197, 61, 0.25); }
    100% { background: transparent; }
  }
  .line.highlighted { animation: riven-highlight 3s ease-out forwards; }

  /* Riven speech panel */
  #riven-speech {
    display: none;
    flex-direction: column;
    background: #161b22;
    border-top: 1px solid #30363d;
    max-height: 280px;
    flex-shrink: 0;
  }
  #riven-speech.visible { display: flex; }

  .speech-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
    border-bottom: 1px solid #21262d;
    flex-shrink: 0;
  }
  .speech-label {
    font-size: 12px;
    color: #ffa657;
    font-weight: 700;
  }
  .speech-close {
    background: none;
    border: none;
    color: #484f58;
    cursor: pointer;
    font-size: 12px;
    padding: 2px 6px;
    border-radius: 3px;
    transition: color 0.15s;
  }
  .speech-close:hover { color: #8b949e; }

  .speech-content {
    padding: 10px 14px;
    overflow-y: auto;
    font-size: 13px;
    line-height: 1.6;
    color: #c9d1d9;
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  }

  .speech-content p { margin-bottom: 8px; }
  .speech-content p:last-child { margin-bottom: 0; }
  .speech-content strong { color: #ffa657; font-weight: 700; }
  .speech-content em { color: #8b949e; font-style: italic; }
  .speech-content code {
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 12px;
    color: #79c0ff;
  }
  .speech-content pre {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 10px 14px;
    margin: 8px 0;
    overflow-x: auto;
  }
  .speech-content pre code {
    background: none;
    border: none;
    padding: 0;
    color: #c9d1d9;
    font-size: 12px;
  }
  .speech-content ul, .speech-content ol {
    padding-left: 20px;
    margin-bottom: 8px;
  }
  .speech-content li { margin-bottom: 4px; }
  .speech-content h1, .speech-content h2, .speech-content h3 {
    color: #58a6ff;
    margin-bottom: 6px;
    margin-top: 12px;
  }
  .speech-content h1:first-child, .speech-content h2:first-child, .speech-content h3:first-child { margin-top: 0; }

  /* Toast notification */
  #riven-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #21262d;
    border: 1px solid #484f58;
    color: #c9d1d9;
    padding: 10px 20px;
    border-radius: 8px;
    font-family: monospace;
    font-size: 13px;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  #riven-toast.visible { opacity: 1; }
</style>
</head>
<body>

<!-- Status overlay (shown when disconnected) -->
<div id="status-overlay" class="visible">
  <div class="dot" id="overlay-dot"></div>
  <div class="msg" id="overlay-msg">Connecting...</div>
  <div class="sub" id="overlay-sub">WebSocket connecting to the editor</div>
</div>

<!-- Riven speech panel (formatted markdown messages from Riven) -->
<div id="riven-speech">
  <div class="speech-header">
    <span class="speech-label">🐾 Riven</span>
    <button class="speech-close" onclick="hideRivenSpeech()" title="Dismiss">✕</button>
  </div>
  <div class="speech-content" id="speech-content"></div>
</div>

<!-- Header -->
<div id="header">
  <span class="title" id="title">Riven Screen</span>
  <span class="meta" id="file-path">—</span>
  <div class="status-badge">
    <div class="dot idle" id="status-dot"></div>
    <span id="status-text">Disconnected</span>
  </div>
</div>

<!-- File display -->
<div id="display">
  <div id="file-header"></div>
  <div id="lines"></div>
</div>

<!-- Footer -->
<div id="footer">
  <span id="version-info">v0</span>
  <span id="client-name">Loading...</span>
  <button id="release-btn" title="Release this screen from its binding" onclick="releaseScreen()">✕ Release</button>
</div>

<script>
// =============================================================================
// State
// =============================================================================

// uid starts empty — server is ALWAYS authoritative and assigns the uid on
// registration. Client-sent uids are ignored. Storing the server-assigned uid
// in localStorage only helps with browser-refresh recovery (not tab duplication).
let uid        = '';
let sessionId  = new URLSearchParams(location.search).get('session_id') || localStorage.getItem('screen_session') || '';
let clientName = localStorage.getItem('screen_name') || 'Workshop Screen';

let ws           = null;
let reconnectMs  = 2000;
let reconnectTmr = null;
let wsConnected  = false;
let wsRegistered = false;

let currentPath    = '';
let currentVersion = 0;
let lines          = [];       // Current displayed lines
let uiVersion      = 0;        // Version shown in UI

// ---- Scroll state ----
// =============================================================================
// UI helpers
// =============================================================================

function showOverlay(msg, sub, dotClass) {
  document.getElementById('overlay-msg').textContent = msg;
  document.getElementById('overlay-sub').textContent = sub || '';
  document.getElementById('overlay-dot').className = 'dot ' + (dotClass || '');
  document.getElementById('status-overlay').classList.add('visible');
}

function hideOverlay() {
  document.getElementById('status-overlay').classList.remove('visible');
}

function setStatus(text, dotClass) {
  document.getElementById('status-text').textContent = text;
  const dot = document.getElementById('status-dot');
  dot.className = 'dot ' + (dotClass || 'idle');
}

function setFilePath(path) {
  document.getElementById('file-path').textContent = path || '—';
  document.getElementById('file-header').textContent = path ? path : '';
  // Update the header title to show the file name when bound
  const title = document.getElementById('title');
  const filename = path ? path.split('/').pop() : '';
  title.textContent = filename ? '📄 ' + filename : 'Riven Screen';
  // Update the browser tab title too
  document.title = filename ? filename + ' — ' + clientName : 'Riven Screen';
}

function setVersion(v) {
  document.getElementById('version-info').textContent = 'v' + v;
}

function setClientName(name) {
  document.getElementById('client-name').textContent = name;
  // Update title: preserve file name if bound, otherwise show client name
  if (currentPath) {
    const filename = currentPath.split('/').pop();
    document.title = filename + ' — ' + name;
  } else {
    document.title = 'Riven Screen — ' + name;
  }
}

function releaseScreen() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'release' }));
}

// =============================================================================
// Scroll helpers
// =============================================================================

function scrollToLine(lineIdx, smooth) {
  const linesEl   = document.getElementById('lines');
  const displayEl = document.getElementById('display');
  if (!linesEl || !displayEl || lineIdx < 0 || lineIdx >= linesEl.children.length) return;

  // Scroll the scrollable ancestor (#display) so the target line lands at the top
  const targetLine = linesEl.children[lineIdx];
  const targetTop  = targetLine.offsetTop;
  displayEl.scrollTo({ top: targetTop, behavior: smooth ? 'smooth' : 'auto' });
}

function scrollToBottom(smooth) {
  const el = document.getElementById('display');
  el.scrollTo({ top: el.scrollHeight, behavior: smooth ? 'smooth' : 'auto' });
}

function _computeScrollTarget(sections) {
  // Walk sections in old-file order. For 'added' sections, section.start is in
  // NEW file / DOM coords — use it directly. 'removed' sections are skipped
  // (their start/end are in OLD file coords and don't map to the current DOM).
  for (const section of sections) {
    if (section.action === 'added') {
      return section.start;
    }
  }
  return null;
}

function _flashLines(targetIdx, count) {
  const el = document.getElementById('lines');
  if (!el) return;
  for (let i = 0; i < count; i++) {
    const lineEl = el.children[targetIdx + i];
    if (lineEl) {
      lineEl.classList.remove('flash');
      void lineEl.offsetWidth; // force reflow to re-trigger animation
      lineEl.classList.add('flash');
    }
  }
}

// =============================================================================
// Syntax highlighting (simple, no external deps)
// =============================================================================

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;');
}

function highlight(line) {
  // Step 1: escape HTML entities so content is safe
  const escaped = esc(line);

  // Step 2: apply highlighting to ESCAPED content
  // Strings (double and single quotes)
  let out = escaped;
  out = out.replace(/&quot;([^&quot;\\]|\\.)*&quot;/g, m => `<span class="token-str">${m}</span>`);
  out = out.replace(/&#39;([^&#\\]|\\.)*&#39;/g, m => `<span class="token-str">${m}</span>`);
  out = out.replace(/`([^`\\]|\\.)*`/g, m => `<span class="token-str">${m}</span>`);

  // Comments
  out = out.replace(/(#.*)$/, m => `<span class="token-cmt">${m}</span>`);

  // Numbers
  out = out.replace(/\b(\d+\.?\d*)\b/g, m => `<span class="token-num">${m}</span>`);

  // Keywords
  const KW = ['def','class','if','elif','else','for','while','try','except','finally',
              'import','from','as','return','yield','raise','with','lambda','pass',
              'break','continue','and','or','not','in','is','True','False','None',
              'async','await','global','nonlocal','assert','del','print'];
  for (const kw of KW) {
    out = out.replace(new RegExp(`\\b(${kw})\\b`, 'g'), m => `<span class="token-kw">${m}</span>`);
  }

  // Function calls (word followed by '(') — but NOT inside already-wrapped spans
  out = out.replace(/&lt;span class=&quot;token-fn&quot;&gt;.*?&lt;\/span&gt;|\b([a-zA-Z_][a-zA-Z0-9_]*)\s*\(/g,
    (m) => {
      if (m.startsWith('&lt;span')) return m; // skip already-wrapped
      return `<span class="token-fn">${m}</span>`;
    });

  // Class names (capitalized words) — skip already-wrapped
  out = out.replace(/&lt;span class=&quot;token-cls&quot;&gt;.*?&lt;\/span&gt;|\b([A-Z][a-zA-Z0-9_]*)\b/g,
    (m) => {
      if (m.startsWith('&lt;span')) return m;
      return `<span class="token-cls">${m}</span>`;
    });

  return out;
}

// =============================================================================
// Line rendering
// =============================================================================

function renderLines(rawLines, action) {
  const container = document.getElementById('lines');

  if (action === 'full') {
    lines = rawLines;
    container.innerHTML = '';
    for (let i = 0; i < rawLines.length; i++) {
      container.appendChild(makeLineEl(i, rawLines[i]));
    }
    return;
  }

  if (action === 'added') {
    // Sections contain {start, end, action, lines}
    //
    // Coordinate system: 'removed' sections use OLD file line indices;
    // 'added' sections use NEW file line indices (the current state).
    // Because these coordinate spaces differ, we process them separately.
    //
    // Process removals in reverse order (highest index first) so that
    // DOM removal indices stay valid — deleting from the end never shifts
    // the indices of elements we haven't processed yet.
    const removals = rawLines.filter(s => s.action === 'removed').reverse();
    let offset = 0;
    for (const section of removals) {
      // section.end - 1 is the last line to remove; subtract cumulative
      // removals so far to get the stable DOM index at processing time.
      const domStart = section.end - 1 - offset;
      for (let i = 0; i < section.lines.length; i++) {
        lines.splice(domStart, 1);
        container.removeChild(container.children[domStart]);
      }
      offset += section.lines.length;
    }

    // Process additions in DOM order. section.start is already in NEW file
    // coordinates (the current state), so we insert directly without any
    // offset adjustment.
    const additions = rawLines.filter(s => s.action === 'added');
    for (const section of additions) {
      for (let i = 0; i < section.lines.length; i++) {
        const idx = section.start + i;
        lines.splice(idx, 0, section.lines[i]);
        container.insertBefore(makeLineEl(idx, section.lines[i], 'added'), container.children[idx] || null);
      }
    }
    return;
  }

  // Unknown action — full refresh
  renderLines(rawLines, 'full');
}

function makeLineEl(idx, text, extraClass) {
  const line = document.createElement('div');
  line.className = 'line' + (extraClass ? ' ' + extraClass : '');

  const num = document.createElement('span');
  num.className = 'line-num';
  num.textContent = idx + 1;

  const content = document.createElement('span');
  content.className = 'line-content';
  // highlight() handles HTML escaping internally
  content.innerHTML = highlight(text);

  line.appendChild(num);
  line.appendChild(content);
  return line;
}

// =============================================================================
// WebSocket
// =============================================================================

function connect() {
  if (ws) {
    ws.close();
    ws = null;
  }

  // Build WebSocket URL relative to current location
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = proto + '//' + location.host + '/module/file/screens/stream';

  showOverlay('Connecting...', wsUrl, 'idle');

  ws = new WebSocket(wsUrl);

  ws.addEventListener('open', () => {
    clearTimeout(reconnectTmr);
    wsConnected = true;
    setStatus('Connecting...', 'idle');
    showOverlay('Registering...', 'Authenticating with Riven', 'idle');

    // Register with the server — uid is intentionally omitted; the server
    // is always authoritative and assigns a unique uid on registration.
    ws.send(JSON.stringify({
      type: 'register',
      session_id: sessionId,
      client_name: clientName,
    }));
  });

  ws.addEventListener('message', (event) => {
    let msg;
    try { msg = JSON.parse(event.data); } catch { return; }

    const type = msg.type;

    if (type === 'registered') {
      wsRegistered = true;
      uid = msg.uid;
      sessionId = msg.session_id || sessionId;
      localStorage.setItem('screen_uid', uid);
      localStorage.setItem('screen_session', sessionId);
      setClientName(clientName);

      // If screen was previously bound, restore the binding display
      if (msg.bound_path) {
        currentPath = msg.bound_path;
        currentVersion = msg.bound_version || 0;
        setFilePath(msg.bound_path);
        setVersion(currentVersion);
        setStatus('Bound: ' + getBaseName(msg.bound_path), 'bound');
      } else {
        hideOverlay();
        setFilePath('');
        setStatus('Idle', 'connected');
      }
      showNotification('Screen registered: ' + uid.substring(0, 8));

    } else if (type === 'bound') {
      currentPath    = msg.path;
      currentVersion = msg.version || 0;
      setFilePath(msg.path);
      setStatus('Bound: ' + getBaseName(msg.path), 'bound');
      showNotification('Bound to: ' + msg.path);

    } else if (type === 'snapshot') {
      if (msg.status === 'error') {
        showNotification('Error: ' + msg.error, 'error');
        return;
      }
      // Update path when content arrives (handles both "bound then snapshot"
      // and standalone "snapshot only" cases)
      if (msg.path) {
        currentPath = msg.path;
        setFilePath(msg.path);
      }
      currentVersion = msg.version || 0;
      setVersion(currentVersion);
      renderLines(msg.lines || [], 'full');

    } else if (type === 'diff') {
      if (!msg.sections || msg.sections.length === 0) return;
      currentVersion = msg.new_version || (currentVersion + 1);
      setVersion(currentVersion);
      renderLines(msg.sections, 'added');

      const targetLine = _computeScrollTarget(msg.sections);
      if (targetLine !== null) {
        const flashCount = msg.sections.reduce((n, s) => n + (s.end - s.start), 0);
        _flashLines(targetLine, flashCount);
        scrollToLine(targetLine, true);
      }

    } else if (type === 'released') {
      currentPath    = '';
      currentVersion = 0;
      setFilePath('');
      setStatus('Released — idle', 'connected');
      lines = [];
      document.getElementById('lines').innerHTML = '';
      showNotification('Released from broadcast');

    } else if (type === 'pong') {
      // keepalive ok — no UI update needed

    } else if (type === 'ping') {
      ws.send(JSON.stringify({ type: 'pong' }));

    } else if (type === 'highlight') {
      // Riven is directing user attention to a specific line range
      if (msg.path && msg.path !== currentPath) return;  // not this file
      if (msg.start == null || msg.end == null) return;
      _highlightLines(msg.start, msg.end, msg.label || '');
      if (msg.scroll !== false) {
        scrollToLine(Math.max(0, msg.start - 1), true);
      }

    } else if (type === 'message') {
      // Riven sends a formatted text message (markdown) to the user
      if (msg.path && msg.path !== currentPath) return;
      showRivenSpeech(msg.text || msg.message || '');

    } else if (type === 'error') {
      showNotification('Error: ' + msg.message, 'error');
    }
  });

  ws.addEventListener('close', () => {
    wsConnected  = false;
    wsRegistered = false;
    setStatus('Reconnecting...', 'idle');
    showOverlay('Reconnecting...', 'Connection lost, retrying in ' + (reconnectMs / 1000) + 's', 'error');

    clearTimeout(reconnectTmr);
    reconnectTmr = setTimeout(() => {
      wsConnected = false;
      connect();
    }, reconnectMs);
    reconnectMs = Math.min(reconnectMs * 1.5, 30000);
  });

  ws.addEventListener('error', () => {
    // Error handled by 'close' event
  });
}

function getBaseName(path) {
  if (!path) return '';
  return path.split('/').pop();
}

// =============================================================================
// Riven speech panel — renders formatted markdown messages
// =============================================================================

/**
 * Lightweight markdown parser: handles code blocks, inline code,
 * **bold**, _italic_, # headings, and line breaks.
 */
function parseMarkdown(text) {
  if (!text) return '';

  let html = text
    // Code blocks: ```lang\n...\n```
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_m, _lang, code) => {
      return '<pre><code>' + _escHtml(code.trim()) + '</code></pre>';
    })
    // Inline code: `...`
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // Bold: **...**
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // Italic: _..._
    .replace(/_(.+?)_/g, '<em>$1</em>')
    // Headings: ### ...
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    // Headings: ## ...
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    // Headings: # ...
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // Inline list items: - item
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    // Wrap consecutive <li> lines in <ul>
    .replace(/(<li>.*<\/li>)(?=\s*(<li>|\s*$))/gs, function(match) {
      return '<ul>' + match + '</ul>';
    })
    // Line breaks
    .replace(/\n/g, '<br>');

  // Wrap non-block content in <p> tags (clean up stray <br>)
  html = html
    .replace(/<br><\/li>/g, '</li>')       // fix br before li
    .replace(/<li>(.+?)(?=(?:<li>|\s*<\/ul>))/g, '<li>$1');

  return html;
}

function _escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showRivenSpeech(text) {
  const panel = document.getElementById('riven-speech');
  const content = document.getElementById('speech-content');
  if (!panel || !content) return;
  content.innerHTML = parseMarkdown(text);
  panel.classList.add('visible');
}

function hideRivenSpeech() {
  const panel = document.getElementById('riven-speech');
  if (panel) panel.classList.remove('visible');
}

function showNotification(text, type) {
  if (!type) type = 'info';
  // Simple in-page flash — no external notifications needed
  console.log('[' + type.toUpperCase() + ']', text);
}

let _toastTimer = null;

function showToast(message, durationMs) {
  if (durationMs === undefined) durationMs = 3500;
  const el = document.getElementById('riven-toast');
  if (!el) return;
  if (_toastTimer) clearTimeout(_toastTimer);
  el.textContent = message;
  el.classList.add('visible');
  _toastTimer = setTimeout(() => el.classList.remove('visible'), durationMs);
}

function _highlightLines(start, end, label) {
  // Convert 1-based server coords to 0-based DOM indices
  const domStart = Math.max(0, start - 1);
  const domEnd   = Math.min(lines.length, end);

  const el = document.getElementById('lines');
  if (!el) return;

  for (let i = domStart; i < domEnd; i++) {
    const lineEl = el.children[i];
    if (lineEl) {
      // Remove any previous highlight (clears pending animation)
      lineEl.classList.remove('highlighted');
      void lineEl.offsetWidth; // force reflow
      lineEl.classList.add('highlighted');
    }
  }

  if (label) {
    showToast(label);
  }
}

// =============================================================================
// Startup
// =============================================================================

// Detect screen name from URL param (e.g., ?name=Workshop+1)
const urlParams = new URLSearchParams(location.search);
const nameParam = urlParams.get('name');
if (nameParam) {
  clientName = decodeURIComponent(nameParam);
  localStorage.setItem('screen_name', clientName);
} else if (!localStorage.getItem('screen_name')) {
  localStorage.setItem('screen_name', 'Workshop Screen');
}

setClientName(clientName);

// Show current UID if already registered
if (uid) {
  showOverlay('Reconnecting...', 'UID: ' + uid.substring(0, 8) + '  |  ' + clientName, 'idle');
}

connect();
</script>
